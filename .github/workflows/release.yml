name: Build and Release Installer

on:
  push:
    tags:
      - 'v*.*.*'       # triggers on tags like v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # allows a manual run from the Actions tab (build only, no release)

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # required to create a GitHub Release and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Publish app
        run: |
          if (Test-Path publish) { Remove-Item -Recurse -Force publish }
          dotnet publish MySoundBoard\MySoundBoard.csproj -c Release -r win-x64 --self-contained false -o publish

      - name: Compile installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\MySoundBoard.iss'

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\MySoundBoard-Setup-*.exe
          generate_release_notes: true
